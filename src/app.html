<!doctype html>
<html lang="pt-BR" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.svg" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#050505" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Preceptor" />
		<meta name="description" content="Preceptor Fisic — prescrição clínica para profissionais CREF/CREFITO" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			// SW só em produção: em dev (localhost) o cache do SW conflita com
			// HMR do Vite e pode servir o fallback "Offline · sem conexão.".
			// Em localhost a gente ATIVAMENTE desregistra qualquer SW antigo
			// que tenha sobrado de testes anteriores (limpa o lixo).
			if ('serviceWorker' in navigator) {
				var __isDev =
					location.hostname === 'localhost' ||
					location.hostname === '127.0.0.1' ||
					location.hostname.endsWith('.local');
				if (__isDev) {
					navigator.serviceWorker.getRegistrations().then(function (regs) {
						regs.forEach(function (r) {
							r.unregister();
						});
					});
					if (window.caches && caches.keys) {
						caches.keys().then(function (keys) {
							keys.forEach(function (k) {
								caches.delete(k);
							});
						});
					}
				} else {
					window.addEventListener('load', function () {
						setTimeout(function () {
							navigator.serviceWorker.register('/sw.js').catch(function () {});
						}, 0);
					});
				}
			}
		</script>
	</body>
</html>
